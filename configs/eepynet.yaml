paths:
  data_root: samples
  processed_dir: samples/processed
  split_path: splits/sleep_edf_seed42.json
  output_dir: runs/eepynet
  checkpoint_dir: runs/eepynet/checkpoints

data:
  selected_channels: ["EEG Fpz-Cz", "EEG Pz-Oz", "EOG horizontal", "EMG submental"]
  sample_rate: 100
  epoch_seconds: 30
  bandpass_low_hz: 0.5
  bandpass_high_hz: 30.0
  trim_wake_minutes: 30
  normalize: per_record_channel_zscore
  include_studies: null

splits:
  seed: 42
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

dataset:
  epochs_per_chunk: 256
  train_stride: 64
  eval_stride: 64
  num_workers: 1
  prefetch_factor: 1

model:
  in_channels: 4
  num_classes: 5
  embedding_dim: 192
  hidden_dim: 192
  signal_base_channels: 64
  signal_branch_channels: 32
  dropout: 0.15
  group_norm_groups: 8

training:
  seed: 42
  device: auto
  epochs: 100
  batch_size: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  mixed_precision: true
  # AMP dtype when mixed_precision is enabled on CUDA.
  #   bf16 : preferred on Ampere+ / Blackwell; no GradScaler needed, more numerically robust
  #   fp16 : narrower exponent range, requires GradScaler (auto-enabled)
  amp_dtype: bf16
  # torch.compile mode (CUDA only — ignored on CPU).
  #   off             : eager mode.
  #   default         : Inductor fusion. Good speedup, no CUDA graphs.
  #   reduce-overhead : adds CUDA graphs. Needs static shapes — partial last chunk may force re-capture.
  #   max-autotune    : aggressive kernel autotuning. Long compile, marginal extra gain.
  # Always invoked with dynamic=True. First train AND first eval iteration each pause ~30-90s to compile.
  #
  # The compile + use_gradient_checkpointing + amp_dtype=bf16 combination still hits an AOT autograd
  # partitioner assertion on torch 2.12 with this model (`AssertionError: Node convert_element_type_N
  # was invalid, but is output`). Workarounds: flip use_gradient_checkpointing to false (current
  # default — fits ~31 GB peak on 32 GB) or switch amp_dtype to fp16.
  compile_mode: reduce-overhead
  # plateau: halves LR after 5 epochs of no macro_f1 improvement; responds to the actual
  # metric rather than a fixed cosine curve. Patience of 5 means 3 reductions before
  # early stopping at 30 epochs — gives the optimizer multiple shots at escaping plateaus.
  scheduler: plateau
  early_stopping_patience: 30
  monitor: macro_f1
  label_smoothing: 0.0
  focal_gamma: 1.0
  eval_smooth_window: 5
  class_weight_power: 0.5
  # Weighted sampler + loss class weights = double-correction for imbalance. Sampler
  # rebalances which chunks are drawn; loss weights then re-weight per sample on top.
  # Keeping only loss weights gives the model accurate gradient signal about class frequency.
  use_weighted_sampler: false
  # Recompute EpochSignalEncoder activations during backward instead of storing them.
  # Trades ~25% step time for a large VRAM reduction in the per-epoch 1D CNN.
  # Must be false when compile_mode != off (see partitioner-bug note above).
  use_gradient_checkpointing: false

augmentation:
  # Applied to training chunks only; val/test always run clean.
  # gaussian_noise_std: additive noise relative to z-scored signal. 0.05 = mild.
  # channel_dropout_prob: probability of zeroing each channel; at least one always kept.
  # amplitude_scale_range: per-channel uniform multiplier [min, max].
  gaussian_noise_std: 0.05
  channel_dropout_prob: 0.1
  amplitude_scale_range: [0.8, 1.2]

inference:
  chunk_size: 128
  stride: 32
  median_smoothing: 0
